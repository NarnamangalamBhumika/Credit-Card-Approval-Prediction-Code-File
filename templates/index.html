<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Credit Card Approval Prediction</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:linear-gradient(135deg,#0d6efd,#6ea8fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;

        }

        .container{

            width:900px;
            background:#ffffff;
            border-radius:15px;
            box-shadow:0px 10px 25px rgba(0,0,0,0.25);
            padding:35px;

        }

        h1{

            text-align:center;
            color:#0d6efd;
            margin-bottom:10px;

        }

        p{

            text-align:center;
            color:gray;
            margin-bottom:30px;

        }

        form{

            display:grid;
            grid-template-columns:1fr 1fr;
            gap:18px;

        }

        .form-group{

            display:flex;
            flex-direction:column;

        }

        label{

            font-weight:bold;
            margin-bottom:6px;
            color:#333;

        }

        input,
        select{

            padding:11px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:15px;
            outline:none;
            transition:0.3s;

        }

        input:focus,
        select:focus{

            border-color:#0d6efd;

        }

        .full{

            grid-column:1/3;

        }

        button{

            width:100%;
            padding:14px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;

        }

        button:hover{

            background:#084298;

        }

        .result{

            margin-top:25px;
            text-align:center;
            font-size:22px;
            font-weight:bold;

        }

        @media(max-width:768px){

            form{

                grid-template-columns:1fr;

            }

            .full{

                grid-column:1;

            }

            .container{

                width:100%;

            }

        }

    </style>

</head>

<body>

<div class="container">

<h1>Credit Card Approval Prediction</h1>

<p>Fill in the applicant details to predict credit card approval.</p>

<form action="/predict" method="POST">

<div class="form-group">

<label>Gender</label>

<select name="gender" required>

<option value="">Select Gender</option>
<option value="F">Female</option>
<option value="M">Male</option>

</select>

</div>

<div class="form-group">

<label>Own Car</label>

<select name="own_car" required>

<option value="">Select</option>
<option value="Y">Yes</option>
<option value="N">No</option>

</select>

</div>

<div class="form-group">

<label>Own Realty</label>

<select name="own_realty" required>

<option value="">Select</option>
<option value="Y">Yes</option>
<option value="N">No</option>

</select>

</div>

<div class="form-group">

<label>Annual Income</label>

<input
type="number"
name="income"
placeholder="Enter Annual Income"
min="0"
required>

</div>
<div class="form-group">

<label>Income Type</label>

<select name="income_type" required>

<option value="">Select Income Type</option>
<option value="Commercial associate">Commercial Associate</option>
<option value="Pensioner">Pensioner</option>
<option value="State servant">State Servant</option>
<option value="Student">Student</option>
<option value="Working">Working</option>

</select>

</div>

<div class="form-group">

<label>Education</label>

<select name="education" required>

<option value="">Select Education</option>
<option value="Academic degree">Academic Degree</option>
<option value="Higher education">Higher Education</option>
<option value="Incomplete higher">Incomplete Higher</option>
<option value="Lower secondary">Lower Secondary</option>
<option value="Secondary / secondary special">Secondary / Secondary Special</option>

</select>

</div>

<div class="form-group">

<label>Family Status</label>

<select name="family_status" required>

<option value="">Select Family Status</option>
<option value="Civil marriage">Civil Marriage</option>
<option value="Married">Married</option>
<option value="Separated">Separated</option>
<option value="Single / not married">Single / Not Married</option>
<option value="Widow">Widow</option>

</select>

</div>

<div class="form-group">

<label>Housing Type</label>

<select name="housing" required>

<option value="">Select Housing Type</option>
<option value="Co-op apartment">Co-op Apartment</option>
<option value="House / apartment">House / Apartment</option>
<option value="Municipal apartment">Municipal Apartment</option>
<option value="Office apartment">Office Apartment</option>
<option value="Rented apartment">Rented Apartment</option>
<option value="With parents">With Parents</option>

</select>

</div>

<div class="form-group">

<label>Occupation</label>

<select name="occupation" required>

<option value="">Select Occupation</option>
<option value="Accountants">Accountants</option>
<option value="Cleaning staff">Cleaning Staff</option>
<option value="Cooking staff">Cooking Staff</option>
<option value="Core staff">Core Staff</option>
<option value="Drivers">Drivers</option>
<option value="HR staff">HR Staff</option>
<option value="High skill tech staff">High Skill Tech Staff</option>
<option value="IT staff">IT Staff</option>
<option value="Laborers">Laborers</option>
<option value="Low-skill Laborers">Low-skill Laborers</option>
<option value="Managers">Managers</option>
<option value="Medicine staff">Medicine Staff</option>
<option value="Private service staff">Private Service Staff</option>
<option value="Realty agents">Realty Agents</option>
<option value="Sales staff">Sales Staff</option>
<option value="Secretaries">Secretaries</option>
<option value="Security staff">Security Staff</option>
<option value="Unknown">Unknown</option>
<option value="Waiters/barmen staff">Waiters/Barmen Staff</option>

</select>

</div>
<div class="form-group">

<label>Number of Family Members</label>

<input
type="number"
name="family_members"
placeholder="Enter Number of Family Members"
min="1"
step="1"
required>

</div>

<div class="form-group">

<label>Age</label>

<input
type="number"
name="age"
placeholder="Enter Age"
min="18"
max="100"
required>

</div>

<div class="form-group full">

<label>Years Employed</label>

<input
type="number"
name="years_employed"
placeholder="Enter Years Employed"
min="0"
step="0.1"
required>

</div>

<div class="form-group full">

<button type="submit">

Predict Credit Card Approval

</button>

</div>

</form>

{% if prediction_text %}

<div class="result">

{% if color == "green" %}

<div style="background:#d4edda;
color:#155724;
padding:18px;
border-radius:10px;
border:2px solid #28a745;">

<h2>{{ prediction_text }}</h2>

</div>

{% else %}

<div style="background:#f8d7da;
color:#721c24;
padding:18px;
border-radius:10px;
border:2px solid #dc3545;">

<h2>{{ prediction_text }}</h2>

</div>

{% endif %}

</div>

{% endif %}

</div>

</body>

</html>
